version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: sqlite:./data/taptask.db
      JWT_SECRET: dev-secret-key-change-in-production
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: debug
    volumes:
      - ./packages/backend/src:/app/backend/src
      - ./data:/app/data
    depends_on:
      - postgres
    networks:
      - taptask

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taptask
      POSTGRES_USER: taptask
      POSTGRES_PASSWORD: taptask-dev-password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - taptask

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: npm run dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
    volumes:
      - ./packages/frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - taptask

volumes:
  postgres-data:

networks:
  taptask:
    driver: bridge
